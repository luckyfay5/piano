<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎹 练琴星球</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:"Nunito",sans-serif;background:#FFFBEB;color:#854D0E;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
#app{position:relative;z-index:1;min-height:100%;max-width:480px;margin:0 auto;display:flex;flex-direction:column}
#view-content{flex:1;overflow-y:auto;padding-bottom:calc(80px + env(safe-area-inset-bottom,0px))}
@media(min-width:768px){#app{max-width:540px}}
.starfield{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 20% 50%,#FEF3C7 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,#FEE2E2 0%,transparent 50%),#FFFBEB}
.glass{background:rgba(255,255,255,.75);backdrop-filter:blur(12px);border:1px solid rgba(234,179,8,.2);border-radius:20px;box-shadow:0 4px 15px rgba(236,72,153,.05)}
.glass-dark{background:rgba(255,255,255,.97);backdrop-filter:blur(16px);border:1px solid rgba(236,72,153,.2);border-radius:20px;box-shadow:0 8px 30px rgba(236,72,153,.1)}
.fredoka{font-family:"Fredoka One",cursive}
@keyframes float{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-12px) rotate(2deg)}}
@keyframes wiggle{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
@keyframes shake{0%,100%{transform:translate(0,0) rotate(0)}25%{transform:translate(-3px,0) rotate(-3deg)}75%{transform:translate(3px,0) rotate(3deg)}}
@keyframes crackglow{0%,100%{transform:scale(1) rotate(-1deg);filter:brightness(1)}50%{transform:scale(1.05) rotate(1deg);filter:brightness(1.15)}}
@keyframes popin{0%{transform:scale(0) rotate(-20deg);opacity:0}70%{transform:scale(1.1) rotate(4deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes glowpulse{0%,100%{box-shadow:0 0 20px rgba(234,179,8,.15)}50%{box-shadow:0 0 42px rgba(236,72,153,.25)}}
@keyframes combofly{0%{transform:translateY(0) translateX(-50%);opacity:1}100%{transform:translateY(-55px) translateX(-50%);opacity:0}}
@keyframes notefall{from{transform:translateY(-70px);opacity:0}6%{opacity:1}to{transform:translateY(var(--fd));opacity:1}}
@keyframes notehit{0%{transform:scale(1);opacity:1}60%{transform:scale(1.4);opacity:.6}100%{transform:scale(.2);opacity:0}}
@keyframes shadow-pulse{0%,100%{transform:translateX(-50%) scale(1);opacity:1}50%{transform:translateX(-50%) scale(.8);opacity:.4}}
@keyframes egg-wiggle-left{0%{transform:rotate(0)}25%{transform:rotate(-18deg) scale(1.08)}50%{transform:rotate(12deg) scale(.96)}75%{transform:rotate(-8deg)}100%{transform:rotate(0)}}
@keyframes egg-wiggle-right{0%{transform:rotate(0)}25%{transform:rotate(18deg) scale(1.08)}50%{transform:rotate(-12deg) scale(.96)}75%{transform:rotate(8deg)}100%{transform:rotate(0)}}
@keyframes egg-bounce{0%{transform:translateY(0) scale(1)}30%{transform:translateY(-22px) scale(1.06,.94)}55%{transform:translateY(0) scale(.94,1.06)}75%{transform:translateY(-10px) scale(1.03,.97)}100%{transform:translateY(0) scale(1)}}
@keyframes egg-spin{0%{transform:rotate(0) scale(1)}40%{transform:rotate(340deg) scale(1.12)}70%{transform:rotate(380deg) scale(.9)}100%{transform:rotate(360deg) scale(1)}}
@keyframes pulseRing{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.5);opacity:0}}
@keyframes taskComplete{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes xpGain{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-40px);opacity:0}}
.anim-float{animation:float 3s ease-in-out infinite}
.anim-wiggle{animation:wiggle .5s ease-in-out infinite}
.anim-shake{animation:shake .3s ease-in-out infinite}
.anim-crack{animation:crackglow 1.5s ease-in-out infinite}
.anim-popin{animation:popin .5s cubic-bezier(.175,.885,.32,1.275) forwards}
.anim-glowpulse{animation:glowpulse 2.2s ease-in-out infinite}
.anim-shadow-pulse{animation:shadow-pulse 3s ease-in-out infinite}
.pet-egg{width:var(--egg-size,88px);height:calc(var(--egg-size,88px) * 1.25);border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;position:relative;box-shadow:inset -10px -15px 20px rgba(0,0,0,.1),inset 8px 8px 15px rgba(255,255,255,.6),0 15px 25px var(--egg-shadow,rgba(236,72,153,.15));overflow:hidden;transform:translateZ(0)}
.pet-egg::after{content:"";position:absolute;top:6%;left:15%;width:40%;height:45%;border-radius:50%;background:linear-gradient(135deg,rgba(255,255,255,.9) 0%,rgba(255,255,255,0) 100%);transform:rotate(-25deg);pointer-events:none}
.egg-interact-wrapper{display:inline-block;transform-origin:bottom center}
.egg-shadow{position:absolute;bottom:-12%;left:50%;transform:translateX(-50%);width:75%;height:25%;background:radial-gradient(ellipse at center,rgba(133,77,14,.15) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:1}
.progress-fill{background:linear-gradient(90deg,#EAB308,#EC4899,#EAB308);background-size:200% auto;animation:shimmer 2s linear infinite;height:100%;border-radius:99px;transition:width .5s ease}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:50;padding-bottom:env(safe-area-inset-bottom,0px)}
@media(min-width:768px){.tab-bar{max-width:540px}}
.tab-inner{margin:6px 10px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border:1px solid rgba(234,179,8,.15);border-radius:20px;padding:6px 4px;display:flex;gap:2px;box-shadow:0 8px 24px rgba(234,179,8,.08)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px;cursor:pointer;border-radius:14px;transition:background .2s;user-select:none}
.tab-item.active{background:rgba(236,72,153,.1)}
.tab-icon{font-size:20px;transition:transform .2s}
.tab-item.active .tab-icon{transform:scale(1.15)}
.tab-label{font-size:9px;font-weight:700;color:#A8A29E;transition:color .2s}
.tab-item.active .tab-label{color:#DB2777}
.btn{border:none;cursor:pointer;font-family:inherit;font-weight:700;border-radius:14px;transition:transform .14s,opacity .14s;display:inline-flex;align-items:center;justify-content:center}
.btn:active{transform:scale(.95)}
.hit-key{border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;user-select:none;border:2px solid;transition:all .1s;font-family:inherit;font-weight:800;padding:6px 2px;background:none}
.hit-key.pressed{filter:brightness(1.1);transform:scale(.92);box-shadow:0 0 14px currentColor}
.note-block{position:absolute;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;pointer-events:none;animation:notefall var(--fd-dur,2s) linear forwards}
.judgment-popup{position:fixed;left:50%;transform:translateX(-50%);font-weight:900;pointer-events:none;animation:combofly .85s ease forwards;white-space:nowrap;text-shadow:0 1px 4px rgba(0,0,0,.15);z-index:80}
.cal-day{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.cal-done{background:rgba(234,179,8,.15);color:#CA8A04;border:1px solid rgba(234,179,8,.3)}
.cal-today{outline:2px solid #EC4899}
.cal-empty{background:rgba(0,0,0,.03);color:#D6D3D1}
.modal-overlay{position:fixed;inset:0;background:rgba(255,251,235,.8);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.rarity-common{background:#FEF3C7;color:#A16207;border:1px solid #FDE68A}
.rarity-rare{background:#FCE7F3;color:#BE185D;border:1px solid #FBCFE8}
.rarity-epic{background:linear-gradient(135deg,#EAB308,#EC4899);color:#fff}
.rarity-legend{background:linear-gradient(135deg,#EC4899,#8B5CF6);color:#fff}

/* ── 新增：任务卡片样式 ── */
.task-card{border-radius:16px;padding:14px;border:2px solid;transition:all .2s;position:relative;overflow:hidden;}
.task-card.done{opacity:.6;border-style:dashed;}
.task-card.active{box-shadow:0 4px 18px rgba(236,72,153,.15);}
.task-card.locked{opacity:.4;}
.phase-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.metro-pulse{animation:pulseRing 1s ease-out infinite;}
.xp-float{position:fixed;pointer-events:none;font-weight:900;font-size:16px;color:#EC4899;z-index:90;animation:xpGain 1s ease forwards;}
.practice-log-item{padding:10px 0;border-bottom:1px solid rgba(234,179,8,.15);animation:fadeUp .3s ease;}
input[type=range]{accent-color:#EC4899;cursor:pointer}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(236,72,153,.3);border-radius:99px}
</style>
</head>
<body>
<div class="starfield"></div>
<div id="app">
  <div id="view-content"></div>
  <div class="tab-bar" id="tab-bar"></div>
</div>
<script>
'use strict';

// ══════════════════════════════════════════
// 常量
// ══════════════════════════════════════════
const XP_LEVELS=[0,150,400,800,1500];
const EGG_STAGES=['沉睡中','轻微颤动','出现裂缝','破壳前夕','✨ 满级'];
const EGG_ANIMS=['anim-float','anim-wiggle','anim-wiggle','anim-shake','anim-crack'];
const EGG_COLORS=[
  ['#E0F2FE','#38BDF8','#0284C7','rgba(2,132,199,.3)'],
  ['#FEF08A','#EAB308','#A16207','rgba(161,98,7,.3)'],
  ['#FFEDD5','#FB923C','#C2410C','rgba(194,65,12,.3)'],
  ['#FBCFE8','#EC4899','#9D174D','rgba(157,23,77,.3)'],
  ['#FDE047','#F59E0B','#BE185D','rgba(236,72,153,.4)'],
];
const NOTE_NAMES=['Do','Re','Mi','Fa','Sol','La','Si'];
const NOTE_COLORS=['#EF4444','#F97316','#F59E0B','#10B981','#3B82F6','#8B5CF6','#EC4899'];
const NOTE_FREQS=[261.63,293.66,329.63,349.23,392.00,440.00,493.88];
const KEY_LABELS=['A','S','D','F','G','H','J'];
const TIPS=['慢速练习是进步最快的方式，先把每个音弹准确再提速。','新曲子先单手练，左右手都熟了再合并。','练习前先听一遍整首曲子，建立对音乐的整体感受。','遇到困难的地方，单独截出来反复练习，攻克它！','保持手腕放松，不要紧绷——想象手心里握着一个苹果。','每次练完，试试从头到尾完整弹一遍，培养演奏感。','节拍器是你最好的朋友，哪怕很慢也要跟着拍子弹。'];
const SONGS=[{name:'自由模式（随机无限）',seq:null},{name:'小星星',seq:[0,0,4,4,5,5,4,3,3,2,2,1,1,0,4,4,3,3,2,2,1,4,4,3,3,2,2,1,0,0,4,4,5,5,4,3,3,2,2,1,1,0]},{name:'玛丽有只小羊羔',seq:[2,1,0,1,2,2,2,1,1,1,2,4,4,2,1,0,1,2,2,2,2,1,1,2,1,0]},{name:'生日快乐',seq:[0,0,1,0,3,2,0,0,1,0,4,3,0,0,0,5,3,2,1,6,6,5,3,4,3]}];
const PETS_R={common:[{id:'c1',emoji:'🐱',name:'音符小猫',color:'#EAB308',power:80,rarity:'common'},{id:'c2',emoji:'🐰',name:'节拍兔',color:'#EC4899',power:90,rarity:'common'},{id:'c3',emoji:'🐸',name:'哼歌青蛙',color:'#EAB308',power:85,rarity:'common'},{id:'c4',emoji:'🐹',name:'练习仓鼠',color:'#EC4899',power:75,rarity:'common'},{id:'c5',emoji:'🦔',name:'刺猬琴手',color:'#EAB308',power:88,rarity:'common'}],rare:[{id:'r1',emoji:'🦊',name:'魔法赤狐',color:'#EC4899',power:220,rarity:'rare'},{id:'r2',emoji:'🦋',name:'旋律蝴蝶',color:'#EAB308',power:240,rarity:'rare'},{id:'r3',emoji:'🐬',name:'海豚音姬',color:'#DB2777',power:210,rarity:'rare'},{id:'r4',emoji:'🦉',name:'夜曲猫头鹰',color:'#EAB308',power:250,rarity:'rare'}],epic:[{id:'e1',emoji:'🐉',name:'韵律龙王',color:'#EAB308',power:600,rarity:'epic'},{id:'e2',emoji:'🦄',name:'星光独角兽',color:'#DB2777',power:650,rarity:'epic'},{id:'e3',emoji:'🔥',name:'烈焰凤凰',color:'#E11D48',power:700,rarity:'epic'}],legend:[{id:'l1',emoji:'✨',name:'宇宙乐神',color:'#EC4899',power:1500,rarity:'legend'}]};
const ALL_PETS=[...PETS_R.common,...PETS_R.rare,...PETS_R.epic,...PETS_R.legend];

// ── 练习阶段定义 ──
const PHASES=[
  {id:'slow',label:'慢速熟悉',icon:'🐢',desc:'用50%速度，弹清楚每个音',minBpm:40,maxBpm:80,xpPerMin:8,color:'#10B981',border:'#6EE7B7'},
  {id:'normal',label:'正常速度',icon:'🎵',desc:'跟着节拍器，保持稳定节奏',minBpm:60,maxBpm:160,xpPerMin:12,color:'#3B82F6',border:'#93C5FD'},
  {id:'complete',label:'完整演奏',icon:'🌟',desc:'从头到尾完整弹一遍，不停顿',minBpm:60,maxBpm:220,xpPerMin:20,color:'#EC4899',border:'#F9A8D4'},
];

function rnd(a){return a[Math.floor(Math.random()*a.length)]}
function petById(id){return ALL_PETS.find(p=>p.id===id)}
function drawPet(streak){const r=Math.random()+streak*.01;if(r>1.08)return PETS_R.legend[0];if(r>0.85)return rnd(PETS_R.epic);if(r>0.55)return rnd(PETS_R.rare);return rnd(PETS_R.common)}
function hexRgb(h){return parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16)}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function fmtTime(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function todayStr(){return new Date().toISOString().slice(0,10)}

// ══════════════════════════════════════════
// 多档案状态
// ══════════════════════════════════════════
let AppStore={profiles:[],activeId:null};
let S=null;

function createProfile(name){
  return{
    id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    name,
    eggXp:0,
    totalMinutes:0,       // 节拍器有效分钟
    totalRawMinutes:0,    // 总练习分钟（含未开节拍器）
    streak:0,
    lastPracticeDate:'',
    collectedPets:[],
    checkinDays:[],
    gameHighScore:0,
    practiceLogs:[],      // [{date,pieceName,phases:[{id,minutes,bpm}],totalMin,xpEarned}]
    settings:{bpm:80,checkInterval:300}
  }
}

function loadStore(){
  try{const r=localStorage.getItem('piano_pet_v6');if(r)AppStore=JSON.parse(r);}catch(_){}
  if(AppStore.profiles.length===0){
    try{
      const raw=localStorage.getItem('piano_pet_v5')||localStorage.getItem('piano_pet_v4_multi');
      if(raw){const old=JSON.parse(raw);
        if(old.profiles){
          AppStore.profiles=old.profiles.map(p=>Object.assign(createProfile(p.name||'未命名'),p));
          AppStore.activeId=old.activeId;
        } else if(old.name){
          const p=Object.assign(createProfile(old.name),old);p.id='legacy';
          AppStore.profiles=[p];AppStore.activeId='legacy';
        }
      }
    }catch(_){}
  }
  if(AppStore.activeId)S=AppStore.profiles.find(p=>p.id===AppStore.activeId)||null;
}
loadStore();
function save(){try{localStorage.setItem('piano_pet_v6',JSON.stringify(AppStore));}catch(_){}}
function eggLevel(){if(!S)return 0;let lv=0;for(let i=0;i<XP_LEVELS.length;i++)if(S.eggXp>=XP_LEVELS[i])lv=i;return lv}
function eggMax(){return eggLevel()>=XP_LEVELS.length-1}
function xpPct(){if(!S)return 0;const lv=eggLevel();if(eggMax())return 100;return Math.min(100,((S.eggXp-XP_LEVELS[lv])/(XP_LEVELS[lv+1]-XP_LEVELS[lv]))*100)}
function addXp(n,x,y){
  if(!S)return;
  S.eggXp+=n;
  save();
  // 浮动XP提示
  if(x!==undefined&&y!==undefined){
    const el=document.createElement('div');
    el.className='xp-float';
    el.textContent='+'+n+' XP';
    el.style.left=x+'px';el.style.top=y+'px';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1000);
  }
}
function recordDay(){
  if(!S)return;
  const today=todayStr();
  if(S.lastPracticeDate===today)return;
  const y=new Date();y.setDate(y.getDate()-1);
  const ys=y.toISOString().slice(0,10);
  S.streak=S.lastPracticeDate===ys?S.streak+1:1;
  S.lastPracticeDate=today;
  if(!S.checkinDays.includes(today))S.checkinDays.push(today);
  save();
}
function getProfilePower(p){if(!p.collectedPets)return 0;return p.collectedPets.reduce((t,c)=>{const pet=petById(c.id);return t+(pet?pet.power*(c.count||1):0)},0)}
function switchProfile(id){AppStore.activeId=id;S=AppStore.profiles.find(p=>p.id===id);save();navigate('home')}
function deleteProfile(id){if(!confirm('确定要删除这个档案？所有数据将清空。'))return;AppStore.profiles=AppStore.profiles.filter(p=>p.id!==id);if(AppStore.activeId===id){AppStore.activeId=AppStore.profiles[0]?.id||null;S=AppStore.profiles[0]||null;}save();if(AppStore.profiles.length===0)currentView='setup';render()}

// ══════════════════════════════════════════
// 3D 蛋
// ══════════════════════════════════════════
function buildEgg(lv,size,animClass){
  const c=EGG_COLORS[Math.min(lv,4)];
  const bg='radial-gradient(circle at 35% 30%,'+c[0]+' 0%,'+c[1]+' 45%,'+c[2]+' 100%)';
  let cr='';
  if(lv>=2)cr+='<path d="M45,25 L40,45 L52,60" fill="none" stroke="rgba(133,77,14,.4)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M45,26 L40,46 L52,61" fill="none" stroke="rgba(255,255,255,.7)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>';
  if(lv>=3)cr+='<path d="M52,60 L65,75 L55,95" fill="none" stroke="rgba(133,77,14,.4)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M52,61 L65,76 L55,96" fill="none" stroke="rgba(255,255,255,.7)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/><path d="M40,45 L25,55 L28,70" fill="none" stroke="rgba(133,77,14,.4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
  if(lv>=4)cr+='<path d="M45,25 L65,10" fill="none" stroke="#EAB308" stroke-width="6" stroke-linecap="round" opacity=".6"/><path d="M45,25 L65,10" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/><path d="M55,95 L45,110" fill="none" stroke="#EAB308" stroke-width="6" stroke-linecap="round" opacity=".6"/><path d="M55,95 L45,110" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>';
  const sa=animClass==='anim-float'?'anim-shadow-pulse':'';
  return `<div style="display:inline-block;position:relative;cursor:pointer;" onmouseenter="eggInteract(this)" ontouchstart="eggInteract(this)">
    <div class="${animClass||'anim-float'}" style="position:relative;z-index:2;">
      <div class="egg-interact-wrapper">
        <div class="pet-egg" style="--egg-size:${size}px;background:${bg};--egg-shadow:${c[3]};">
          <svg width="100%" height="100%" viewBox="0 0 100 125" style="position:absolute;inset:0;pointer-events:none;z-index:2;">${cr}</svg>
        </div>
      </div>
    </div>
    <div class="egg-shadow ${sa}"></div>
  </div>`;
}

const EGG_REACTIONS=[['egg-wiggle-left',500],['egg-wiggle-right',500],['egg-bounce',600],['egg-spin',600]];
let eggCD=false;
function eggInteract(el){
  if(eggCD)return;
  const w=el.querySelector('.egg-interact-wrapper');
  if(!w||w.dataset.playing==='true')return;
  eggCD=true;w.dataset.playing='true';
  const r=rnd(EGG_REACTIONS);
  w.style.animation='none';void w.offsetWidth;
  w.style.animation=r[0]+' '+(r[1]/1000)+'s ease-out forwards';
  setTimeout(()=>{w.dataset.playing='false';w.style.animation='';eggCD=false;},r[1]);
}

// ══════════════════════════════════════════
// 音频
// ══════════════════════════════════════════
let audioCtx=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx}
let metroOn=false,metroIv=null,metroNext=0,metroBeat=0;
function metroClick(t,ac){const ctx=getCtx(),o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=ac?1200:800;o.type='sine';g.gain.setValueAtTime(ac?.45:.28,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);o.start(t);o.stop(t+.08)}
function metroTick(){const ctx=getCtx();while(metroNext<ctx.currentTime+.1){metroClick(metroNext,metroBeat%4===0);metroNext+=60/(S?.settings.bpm||80);metroBeat++;}}
function startMetro(){const ctx=getCtx();metroNext=ctx.currentTime+.05;metroBeat=0;metroOn=true;metroIv=setInterval(metroTick,25)}
function stopMetro(){clearInterval(metroIv);metroOn=false;metroBeat=0}
function toggleMetro(){metroOn?stopMetro():startMetro();refreshPractice()}
function restartMetro(){if(!metroOn)return;clearInterval(metroIv);const ctx=getCtx();metroNext=ctx.currentTime+.05;metroBeat=0;metroIv=setInterval(metroTick,25)}
function playChime(){try{const ctx=getCtx();[880,1100,1320].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type='sine';const t=ctx.currentTime+i*.12;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.3,t+.05);g.gain.exponentialRampToValueAtTime(.001,t+.7);o.start(t);o.stop(t+.7)});}catch(_){}}
function playSuccess(){try{const ctx=getCtx();[523,659,784,1047].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type='sine';const t=ctx.currentTime+i*.1;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.25,t+.04);g.gain.exponentialRampToValueAtTime(.001,t+.5);o.start(t);o.stop(t+.5)});}catch(_){}}
function playNoteSound(i){try{const ctx=getCtx(),o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=NOTE_FREQS[i];o.type='triangle';g.gain.setValueAtTime(.35,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.45);o.start(ctx.currentTime);o.stop(ctx.currentTime+.45);}catch(_){}}

let practiceState={
  running:false,          // 是否在计时（仅节拍器开启时为true）
  sessionSeconds:0,       // 本次会话总秒数（任何时候）
  metroSeconds:0,         // 节拍器有效秒数
  currentPhase:0,         // 当前阶段索引 0/1/2
  phaseData:[             // 每阶段数据
    {minutes:0,xp:0,done:false},
    {minutes:0,xp:0,done:false},
    {minutes:0,xp:0,done:false},
  ],
  pieceName:'',           // 当前练习曲目名
  sessionStarted:false,   // 是否已经开始（选了曲目）
  aiTasks:[],             // AI分析生成的任务列表
  aiTasksDone:[],         // 已完成任务id
  aiAnalyzed:false,
};

let sessionLog=null;      // 当次会话日志，结束时存入

function refreshPractice(){
  if(currentView!=='practice')return;
  const el=document.getElementById('view-content');
  if(el){el.innerHTML=buildPractice();afterPracticeRender();}
}

function startSession(pieceName){
  practiceState.pieceName=pieceName||'自由练习';
  practiceState.sessionStarted=true;
  practiceState.running=false;
  practiceState.sessionSeconds=0;
  practiceState.metroSeconds=0;
  practiceState.currentPhase=0;
  practiceState.phaseData=[{minutes:0,xp:0,done:false},{minutes:0,xp:0,done:false},{minutes:0,xp:0,done:false}];
  practiceState.aiTasksDone=[];
  recordDay();
  sessionLog={date:todayStr(),pieceName:practiceState.pieceName,phases:[],totalMin:0,xpEarned:0};
  // 全局计时（含暂停）
  practiceTimer=setInterval(tickPractice,1000);
  refreshPractice();
}

function tickPractice(){
  practiceState.sessionSeconds++;
  // 只有节拍器开启时才计有效时间和XP
  if(metroOn&&practiceState.running){
    practiceState.metroSeconds++;
    const phase=PHASES[practiceState.currentPhase];
    const pd=practiceState.phaseData[practiceState.currentPhase];
    // 每60秒给XP
    if(practiceState.metroSeconds%60===0){
      pd.minutes++;
      pd.xp+=phase.xpPerMin;
      addXp(phase.xpPerMin);
      if(S){S.totalMinutes++;S.totalRawMinutes++;}
      save();
    }
  } else if(!metroOn&&practiceState.running){
    // 节拍器关闭但会话在跑：只计原始分钟，不给XP
    practiceState.sessionSeconds; // already incremented
    if(practiceState.sessionSeconds%60===0&&S){S.totalRawMinutes++;save();}
  }
  // 每5秒刷新一次计时显示
  if(practiceState.sessionSeconds%5===0)refreshTimerOnly();
}

function refreshTimerOnly(){
  const te=document.getElementById('pt');if(te)te.textContent=fmtTime(practiceState.sessionSeconds);
  const me=document.getElementById('metro-sec');if(me)me.textContent=fmtTime(practiceState.metroSeconds);
  // 进度条
  const phase=PHASES[practiceState.currentPhase];
  const pd=practiceState.phaseData[practiceState.currentPhase];
  const targetMin=3; // 每阶段目标3分钟节拍器时间
  const pct=Math.min(100,(pd.minutes/targetMin)*100);
  const pb=document.getElementById('phase-progress');if(pb)pb.style.width=pct+'%';
}

function toggleMetroPractice(){
  if(!practiceState.sessionStarted)return;
  practiceState.running=!practiceState.running;
  if(practiceState.running){
    startMetro();
  } else {
    stopMetro();
  }
  refreshPractice();
}

function completePhase(){
  const pd=practiceState.phaseData[practiceState.currentPhase];
  if(pd.done)return;
  pd.done=true;
  playSuccess();
  // 阶段完成奖励
  const bonus=PHASES[practiceState.currentPhase].xpPerMin*5;
  addXp(bonus);
  pd.xp+=bonus;
  if(practiceState.currentPhase<2){
    setTimeout(()=>{
      practiceState.currentPhase++;
      practiceState.metroSeconds=0; // 重置阶段计时
      if(metroOn)restartMetro();
      refreshPractice();
    },800);
  } else {
    // 全部完成
    finishSession();
  }
  refreshPractice();
}

function changeBpm(delta){
  if(!S)return;
  S.settings.bpm=Math.max(40,Math.min(220,S.settings.bpm+delta));
  save();restartMetro();refreshPractice();
}

function finishSession(){
  clearInterval(practiceTimer);practiceTimer=null;
  if(metroOn)stopMetro();
  practiceState.running=false;
  // 保存日志
  if(S&&sessionLog){
    const totalXp=practiceState.phaseData.reduce((s,p)=>s+p.xp,0);
    sessionLog.phases=practiceState.phaseData.map((pd,i)=>({id:PHASES[i].id,minutes:pd.minutes,xp:pd.xp,done:pd.done}));
    sessionLog.totalMin=Math.floor(practiceState.sessionSeconds/60);
    sessionLog.xpEarned=totalXp;
    sessionLog.aiTasks=practiceState.aiTasks.length;
    sessionLog.aiTasksDone=practiceState.aiTasksDone.length;
    if(!S.practiceLogs)S.practiceLogs=[];
    S.practiceLogs.unshift(sessionLog);
    if(S.practiceLogs.length>50)S.practiceLogs=S.practiceLogs.slice(0,50);
    save();
  }
  showSessionSummary();
}

function exitPractice(){
  if(practiceTimer){clearInterval(practiceTimer);practiceTimer=null;}
  if(metroOn)stopMetro();
  practiceState.running=false;
  practiceState.sessionStarted=false;
  if(camOn){camOn=false;if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}}
  if(analyzerStream){analyzerStream.getTracks().forEach(t=>t.stop());analyzerStream=null;}
  analyzerState='idle';
}

  const completedPhases=practiceState.phaseData.filter(p=>p.done).length;
  const m=document.createElement('div');
  m.className='modal-overlay';
  m.innerHTML=`
    <div class="anim-popin glass-dark" style="border-radius:28px;padding:28px;text-align:center;max-width:310px;width:100%;">
      <div style="font-size:56px;margin-bottom:8px;">${completedPhases===3?'🎉':completedPhases>=1?'👏':'🎹'}</div>
      <h2 class="fredoka" style="font-size:26px;color:#854D0E;margin-bottom:6px;">${completedPhases===3?'完美练习！':'练习结束'}</h2>
      <div style="font-size:12px;color:#B45309;margin-bottom:16px;">${esc(practiceState.pieceName)}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;">
        ${[['⏱ 总时长',fmtTime(practiceState.sessionSeconds),'#EAB308'],['🎵 节拍时长',fmtTime(practiceState.metroSeconds),'#3B82F6'],['✅ 完成阶段',completedPhases+'/3','#10B981'],['⭐ 获得XP','+'+totalXp,'#EC4899']].map(([l,v,c])=>`
          <div style="background:rgba(0,0,0,.03);border-radius:12px;padding:11px;">
            <div style="font-size:10px;color:#B45309;margin-bottom:2px;">${l}</div>
            <div class="fredoka" style="font-size:22px;color:${c};">${v}</div>
          </div>`).join('')}
      </div>
      ${practiceState.aiTasksDone.length>0?`<div style="padding:10px;background:#FCE7F3;border-radius:12px;margin-bottom:14px;font-size:12px;color:#DB2777;">✨ 完成 ${practiceState.aiTasksDone.length} 个AI任务</div>`:''}
      <button class="btn" id="summary-close" style="width:100%;padding:14px;background:linear-gradient(135deg,#EAB308,#EC4899);color:#fff;font-size:15px;border-radius:14px;">好的！继续加油 🐣</button>
    </div>`;
  document.body.appendChild(m);
  m.querySelector('#summary-close').addEventListener('click',()=>{
    m.remove();
    practiceState.sessionStarted=false;
    practiceState.aiTasks=[];
    practiceState.aiTasksDone=[];
    practiceState.aiAnalyzed=false;
    parsedTasks=[];
    refreshPractice();
  });
  if(completedPhases===3)playChime();
}

function completeAiTask(taskId){
  if(practiceState.aiTasksDone.includes(taskId))return;
  practiceState.aiTasksDone.push(taskId);
  addXp(15);
  playSuccess();
  refreshPractice();
}

function doHatch(){
  if(!eggMax()||!S)return;
  const pet=drawPet(S.streak);
  S.eggXp=0;
  const ext=S.collectedPets.find(p=>p.id===pet.id);
  if(ext)ext.count=(ext.count||1)+1;
  else S.collectedPets.push({id:pet.id,count:1,ts:Date.now()});
  save();showHatchModal(pet);
}

function loadSheet(e){const f=e.target.files[0];if(!f)return;if(sheetData)URL.revokeObjectURL(sheetData.url);sheetData={url:URL.createObjectURL(f),type:f.type};sheetName=f.name;refreshPractice()}
function clearSheet(){if(sheetData)URL.revokeObjectURL(sheetData.url);sheetData=null;sheetName='';refreshPractice()}

// 摄像头（手型镜）
function toggleCamera(){
  if(camOn){camOn=false;if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}refreshPractice();return;}
  if(!navigator.mediaDevices?.getUserMedia){alert('无法调用摄像头，请确保在 HTTPS 环境下访问。');return;}
  startPracticeCamera();
}
function startPracticeCamera(){
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:camFacing}}})
    .then(s=>{camOn=true;camStream=s;refreshPractice();setTimeout(()=>{const v=document.getElementById('cam-video');if(v){v.srcObject=s;v.style.transform=camFacing==='user'?'scaleX(-1)':'none';}},60);})
    .catch(err=>alert('无法访问摄像头：'+err.message));
}
function switchPracticeCamera(){camFacing=camFacing==='user'?'environment':'user';if(camOn)startPracticeCamera();}
function afterPracticeRender(){
  if(camOn&&camStream){const v=document.getElementById('cam-video');if(v){v.srcObject=camStream;v.style.transform=camFacing==='user'?'scaleX(-1)':'none';}}
  if(analyzerState==='capturing'&&analyzerStream){const v=document.getElementById('analyzer-video');if(v){v.srcObject=analyzerStream;v.style.transform=analyzerFacing==='user'?'scaleX(-1)':'none';}}
}

function openAnalyzer(){
  analyzerState='capturing';analyzerResult='';parsedTasks=[];
  practiceState.aiTasks=[];practiceState.aiTasksDone=[];
  refreshPractice();
  if(!navigator.mediaDevices?.getUserMedia){
    analyzerState='error';analyzerResult='无法调用摄像头，请在 HTTPS 环境下访问。';refreshPractice();return;
  }
  startAnalyzerCamera();
}
function startAnalyzerCamera(){
  if(analyzerStream){analyzerStream.getTracks().forEach(t=>t.stop());analyzerStream=null;}
  setTimeout(()=>{
    const v=document.getElementById('analyzer-video');if(!v)return;
    navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:analyzerFacing}}})
      .then(s=>{analyzerStream=s;v.srcObject=s;v.style.transform=analyzerFacing==='user'?'scaleX(-1)':'none';})
      .catch(err=>{analyzerState='error';analyzerResult='摄像头错误：'+err.message;refreshPractice();});
  },80);
}
function switchAnalyzerCamera(){analyzerFacing=analyzerFacing==='environment'?'user':'environment';startAnalyzerCamera();}
function closeAnalyzer(){
  if(analyzerStream){analyzerStream.getTracks().forEach(t=>t.stop());analyzerStream=null;}
  analyzerState='idle';analyzerResult='';refreshPractice();
}
async function captureAndAnalyze(){
  const v=document.getElementById('analyzer-video'),c=document.getElementById('analyzer-canvas');
  if(!v||!c)return;
  c.width=v.videoWidth||640;c.height=v.videoHeight||480;
  const ctx2d=c.getContext('2d');
  if(analyzerFacing==='user'){ctx2d.translate(c.width,0);ctx2d.scale(-1,1);}
  ctx2d.drawImage(v,0,0,c.width,c.height);
  if(analyzerFacing==='user')ctx2d.setTransform(1,0,0,1,0,0);
  const b64=c.toDataURL('image/jpeg',.85).split(',')[1];
  if(analyzerStream){analyzerStream.getTracks().forEach(t=>t.stop());analyzerStream=null;}
  analyzerState='analyzing';refreshPractice();
  try{
    const resp=await fetch('/api/analyze',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'qwen-vl-max',
        max_tokens:1000,
        messages:[{
          role:'user',
          content:[
            {type:'text',text:`你是一个专业的儿童钢琴老师。请分析这张钢琴乐谱照片，用10岁孩子能懂的语言返回JSON。

要求返回如下JSON格式（不要返回任何其他内容，不要加markdown代码块）：
{
  "pieceName": "曲目名称（如果能识别）或'未知曲目'",
  "summary": "一句话描述这首曲子的风格和情绪（15字内）",
  "difficulty": "初级/中级/高级",
  "tasks": [
    {"id":"t1","icon":"🎯","title":"任务标题（8字内）","desc":"具体要做什么（20字内）","phase":"slow"},
    {"id":"t2","icon":"👐","title":"任务标题","desc":"具体要做什么","phase":"normal"},
    {"id":"t3","icon":"⭐","title":"任务标题","desc":"具体要做什么","phase":"complete"}
  ],
  "tips": "给孩子的一句鼓励（15字内）"
}

tasks必须有3个，phase分别对应slow/normal/complete三个练习阶段。
如果照片里没有清晰的五线谱，请返回：{"error":"请重新拍摄清晰的乐谱照片"}`},
            {type:'image_url',image_url:{url:`data:image/jpeg;base64,${b64}`}}
          ]
        }]
      })
    });
    const rawText=await resp.text();
    let data;
    try{data=JSON.parse(rawText);}catch(_){throw new Error('服务器响应格式异常');}
    if(!resp.ok)throw new Error('API错误 '+resp.status+': '+(data.error?.message||JSON.stringify(data.error)||'未知'));
    const content=data.choices?.[0]?.message?.content||'';
    // 解析AI返回的JSON
    let aiJson;
    try{
      // 去除可能的markdown代码块
      const clean=content.replace(/```json\n?|\n?```/g,'').trim();
      aiJson=JSON.parse(clean);
    }catch(_){
      // 尝试从文本中提取JSON
      const match=content.match(/\{[\s\S]*\}/);
      if(match)try{aiJson=JSON.parse(match[0]);}catch(_2){aiJson=null;}
    }
    if(aiJson?.error){
      analyzerResult=aiJson.error;analyzerState='error';refreshPractice();return;
    }
    if(aiJson?.tasks){
      parsedTasks=aiJson.tasks;
      practiceState.aiTasks=aiJson.tasks;
      practiceState.aiAnalyzed=true;
      analyzerResult=JSON.stringify(aiJson);
      // 如果识别了曲目名，自动填入
      if(aiJson.pieceName&&aiJson.pieceName!=='未知曲目'&&!practiceState.sessionStarted){
        practiceState.pendingPieceName=aiJson.pieceName;
      }
      analyzerState='done';
    } else {
      analyzerResult=content;analyzerState='done_raw';
    }
  }catch(e){
    analyzerResult='出错了：'+e.message;analyzerState='error';
  }
  refreshPractice();
}

function applyAiAndStart(){
  const name=practiceState.pendingPieceName||practiceState.pieceName||'AI识谱练习';
  closeAnalyzer();
  if(!practiceState.sessionStarted)startSession(name);
  else{practiceState.aiTasks=parsedTasks;practiceState.aiTasksDone=[];}
  refreshPractice();
}

let gameState='idle',gameSong=0,gameScore=0,gameCombo=0,gameMaxCombo=0;
let gameLiveNotes=[],gameNoteId=0,noteTimer=null,seqIdx=0,_gameKey=null;
function startGame(){gameState='playing';gameScore=0;gameCombo=0;gameMaxCombo=0;gameLiveNotes=[];gameNoteId=0;seqIdx=0;render();bindGameKeys();spawnLoop()}
function endGame(){clearInterval(noteTimer);noteTimer=null;removeGameKeys();const xp=Math.floor(gameScore/10);if(xp>0)addXp(xp);if(S&&gameScore>S.gameHighScore){S.gameHighScore=gameScore;save();}gameState='result';render()}
function selectSong(i){gameSong=i;render()}
function spawnLoop(){const song=SONGS[gameSong],iv=song.seq?620:880;noteTimer=setInterval(()=>{if(gameState!=='playing'){clearInterval(noteTimer);return;}const lane=song.seq?song.seq[seqIdx++%song.seq.length]:Math.floor(Math.random()*7);spawnNote(lane);sweepMissed();},iv)}
function spawnNote(lane){const fz=document.getElementById('fall-zone');if(!fz)return;const h=fz.clientHeight,id=gameNoteId++,dur=Math.max(1.3,2.4-gameCombo*.025),lw=100/7;const el=document.createElement('div');el.id='gn-'+id;el.className='note-block';el.style.cssText='left:'+((lane*lw+lw*.08).toFixed(2))+'%;width:'+((lw*.84).toFixed(2))+'%;height:46px;top:0;--fd:'+(h+70)+'px;--fd-dur:'+dur+'s;background:'+NOTE_COLORS[lane]+';color:#fff;font-weight:800;box-shadow:0 4px 14px '+NOTE_COLORS[lane]+'77;';el.textContent=NOTE_NAMES[lane];fz.appendChild(el);gameLiveNotes.push({id,lane,el,hit:false})}
function sweepMissed(){const fz=document.getElementById('fall-zone');if(!fz)return;const bottom=fz.getBoundingClientRect().bottom;gameLiveNotes=gameLiveNotes.filter(n=>{if(n.hit)return false;const r=n.el.getBoundingClientRect();if(r.top>bottom+12){n.el.remove();gameCombo=0;showJudgment('MISS','#A8A29E',bottom-100);updateGameHUD();return false;}return true})}
function hitLane(lane){playNoteSound(lane);flashKey(lane);const fz=document.getElementById('fall-zone');if(!fz)return;const fzR=fz.getBoundingClientRect(),hitTop=fzR.bottom-130,hitBot=fzR.bottom+15;let best=null,bestDist=Infinity;for(const n of gameLiveNotes){if(n.lane!==lane||n.hit)continue;const r=n.el.getBoundingClientRect(),mid=r.top+r.height/2;if(mid>hitTop&&mid<hitBot){const d=Math.abs(mid-(fzR.bottom-70));if(d<bestDist){bestDist=d;best=n;}}}if(best){best.hit=true;best.el.style.animation='notehit .22s ease forwards';setTimeout(()=>best.el.remove(),220);gameCombo++;if(gameCombo>gameMaxCombo)gameMaxCombo=gameCombo;gameScore+=100*Math.min(gameCombo,8);showJudgment(bestDist<22?'PERFECT!':'GREAT',bestDist<22?'#EC4899':'#EAB308',fzR.bottom-120);updateGameHUD();}}
function flashKey(lane){const k=document.getElementById('hk-'+lane);if(!k)return;k.classList.add('pressed');setTimeout(()=>k.classList.remove('pressed'),140)}
function updateGameHUD(){const sd=document.getElementById('gscore');if(sd)sd.textContent=gameScore;const cd=document.getElementById('gcombo');if(cd)cd.textContent=gameCombo>1?gameCombo+'×':''}
function showJudgment(text,color,top){const el=document.createElement('div');el.className='judgment-popup';el.style.color=color;el.style.fontSize=(text==='PERFECT!'?'24px':'18px');el.style.top=(top||200)+'px';el.textContent=text;document.body.appendChild(el);setTimeout(()=>el.remove(),850)}
function bindGameKeys(){_gameKey=e=>{const i=KEY_LABELS.indexOf(e.key.toUpperCase());if(i>=0)hitLane(i)};window.addEventListener('keydown',_gameKey)}
function removeGameKeys(){if(_gameKey){window.removeEventListener('keydown',_gameKey);_gameKey=null}}

    <div style="margin-bottom:16px;">
      <div style="font-size:11px;font-weight:700;color:#B45309;margin-bottom:7px;">${sec.label}</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;">
        ${PETS_R[sec.key].map(pet=>{
          const g=got.includes(pet.id),cnt=got.filter(id=>id===pet.id).length;
          return `<div style="border-radius:13px;padding:10px 6px;text-align:center;position:relative;
            background:${g?'#fff':'rgba(0,0,0,.03)'};border:1px solid ${g?'#FDE68A':'rgba(0,0,0,.05)'};opacity:${g?1:.6};">
            <div style="font-size:30px;margin-bottom:3px;${g?'':'filter:grayscale(1) opacity(.5);'}">${g?pet.emoji:'❓'}</div>
            <div style="font-size:9px;font-weight:700;color:${g?'#854D0E':'#D97706'};line-height:1.3;">${g?esc(pet.name):'???'}</div>
            ${g?`<div style="font-size:8px;color:#D97706;margin-top:2px;">PWR ${pet.power}</div>`:''}
            ${cnt>1?`<div style="position:absolute;top:3px;right:3px;background:#FCE7F3;color:#DB2777;border-radius:99px;width:14px;height:14px;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;">×${cnt}</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`).join('')}
    <div style="text-align:center;padding:11px;border-radius:11px;background:rgba(0,0,0,.03);font-size:10px;color:#B45309;">连续练琴天数越多，获得稀有宠物概率越高 · 当前 ${S.streak} 天</div>
  </div>`;
}

function buildPKArena(){
  if(AppStore.profiles.length<2)return`<div style="padding:40px 24px;text-align:center;">
    <div style="font-size:50px;margin-bottom:16px;">⚔️</div>
    <h2 class="fredoka" style="font-size:24px;color:#EC4899;margin-bottom:12px;">竞技场尚未开启</h2>
    <p style="font-size:13px;color:#854D0E;margin-bottom:24px;">需要至少 2 个成员才能进行对战。<br>请点击左上角头像，录入新成员。</p>
  </div>`;
  if(!pkFighter1||!AppStore.profiles.find(p=>p.id===pkFighter1.id))pkFighter1=AppStore.profiles[0];
  if(!pkFighter2||!AppStore.profiles.find(p=>p.id===pkFighter2.id))pkFighter2=AppStore.profiles[Math.min(1,AppStore.profiles.length-1)];
  const card=(f,sid)=>{
    const pw=getProfilePower(f);
    let best=null;
    if(f.collectedPets?.length){const arr=f.collectedPets.map(c=>petById(c.id)).filter(Boolean).sort((a,b)=>b.power-a.power);best=arr[0];}
    const opts=AppStore.profiles.map(p=>`<option value="${p.id}" ${p.id===f.id?'selected':''}>${esc(p.name)}</option>`).join('');
    return `<div class="glass" style="flex:1;padding:16px;text-align:center;border-radius:20px;">
      <select id="${sid}" style="width:100%;padding:8px;border-radius:10px;border:1px solid rgba(234,179,8,.25);font-weight:800;font-size:14px;color:#854D0E;margin-bottom:12px;background:rgba(255,255,255,.6);outline:none;">${opts}</select>
      <div style="font-size:52px;height:70px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;">${best?best.emoji:'🥚'}</div>
      <div style="font-size:10px;color:#B45309;font-weight:700;">最强：${best?esc(best.name):'无'}</div>
      <div style="background:rgba(0,0,0,.04);border-radius:12px;padding:8px;margin-top:12px;">
        <div style="font-size:9px;color:#B45309;margin-bottom:2px;">总战力</div>
        <div class="fredoka" style="font-size:24px;color:#EC4899;">${pw}</div>
      </div>
    </div>`;
  };
  return `<div style="padding:20px 16px;">
    <h2 class="fredoka" style="font-size:24px;color:#EC4899;text-align:center;margin-bottom:6px;">⚔️ 宠物竞技场</h2>
    <p style="text-align:center;font-size:12px;color:#B45309;margin-bottom:24px;">用你们收集到的幻兽对决吧！</p>
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:30px;">
      ${card(pkFighter1,'sel-f1')}
      <div class="fredoka" style="font-size:24px;color:#EAB308;text-align:center;flex-shrink:0;">VS</div>
      ${card(pkFighter2,'sel-f2')}
    </div>
    <div style="text-align:center;">
      ${pkState==='idle'?`<button class="btn" onclick="startPK()" style="padding:16px 40px;background:linear-gradient(135deg,#EAB308,#EC4899);color:#fff;font-size:18px;font-weight:800;border-radius:18px;box-shadow:0 8px 24px rgba(236,72,153,.3);">开始对战 👊</button>`:
      pkState==='fighting'?`<div class="fredoka" style="font-size:24px;color:#EC4899;">能量对撞中...</div>`:
      `<div class="anim-popin">
        <h3 class="fredoka" style="font-size:32px;color:#EAB308;margin-bottom:16px;">🏆 胜者: ${pkWinner?esc(pkWinner.name):'平局'}</h3>
        <button class="btn" id="pk-again" style="padding:10px 24px;background:none;border:2px solid #EAB308;color:#EAB308;border-radius:12px;">再来一局</button>
      </div>`}
    </div>
  </div>`;
}

function buildStats(){
  if(!S)return'';
  const now=new Date(),y=now.getFullYear(),mo=now.getMonth(),td=now.getDate();
  const fd=new Date(y,mo,1).getDay(),dim=new Date(y,mo+1,0).getDate();
  let cal=['日','一','二','三','四','五','六'].map(d=>`<div style="text-align:center;font-size:9px;font-weight:700;color:#B45309;">${d}</div>`).join('');
  for(let i=0;i<fd;i++)cal+=`<div class="cal-day cal-empty"></div>`;
  for(let d=1;d<=dim;d++){const ds=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;cal+=`<div class="cal-day ${S.checkinDays.includes(ds)?'cal-done':'cal-empty'} ${d===td?'cal-today':''}">${d}</div>`;}

  const logs=S.practiceLogs||[];
  const totalEffMin=S.totalMinutes||0;
  const totalRawMin=S.totalRawMinutes||0;
  const metroRate=totalRawMin>0?Math.round((totalEffMin/totalRawMin)*100):0;

  // 按曲目统计
  const byPiece={};
  logs.forEach(l=>{
    if(!byPiece[l.pieceName])byPiece[l.pieceName]={count:0,minutes:0,xp:0};
    byPiece[l.pieceName].count++;
    byPiece[l.pieceName].minutes+=l.totalMin;
    byPiece[l.pieceName].xp+=l.xpEarned;
  });
  const pieces=Object.entries(byPiece).sort((a,b)=>b[1].minutes-a[1].minutes).slice(0,5);

  const ms=[['第一次练琴',S.totalRawMinutes>0],['有效练习10分钟',totalEffMin>=10],['有效练习60分钟',totalEffMin>=60],['完成一次完整演奏阶段',logs.some(l=>(l.phases||[]).find(p=>p.id==='complete'&&p.done))],['收集第1只宠物',S.collectedPets.length>=1],['收集5只宠物',[...new Set(S.collectedPets.map(p=>p.id))].length>=5],['连续练琴3天',S.streak>=3],['连续练琴7天',S.streak>=7],['完成AI任务5次',logs.reduce((s,l)=>s+(l.aiTasksDone||0),0)>=5],['获得稀有宠物',S.collectedPets.some(p=>['rare','epic','legend'].includes(petById(p.id)?.rarity))]];

  return `<div style="padding:16px;">
    <h2 class="fredoka" style="font-size:22px;color:#EC4899;margin-bottom:13px;">📊 练琴记录</h2>

    <!-- 核心数据 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px;">
      ${[['🔥','#EAB308',S.streak,'连续天数'],['⏱','#3B82F6',totalEffMin,'有效分钟'],['📊','#10B981',metroRate+'%','节拍器使用率'],['🐾','#EC4899',S.collectedPets.length,'收集宠物']].map(([ico,col,val,lab])=>`<div class="glass" style="border-radius:15px;padding:14px;text-align:center;"><div style="font-size:26px;margin-bottom:3px;">${ico}</div><div class="fredoka" style="font-size:28px;color:${col};">${val}</div><div style="font-size:9px;color:#B45309;font-weight:700;">${lab}</div></div>`).join('')}
    </div>

    <!-- 节拍器使用率说明 -->
    <div style="background:#E0F2FE;border:1px solid #BAE6FD;border-radius:12px;padding:10px 13px;margin-bottom:12px;font-size:11px;color:#0284C7;">
      📊 节拍器使用率 = 有效练习 ${totalEffMin} 分钟 ÷ 总练习 ${totalRawMin} 分钟<br>
      <span style="opacity:.8;">越高说明你练琴越专注、越规律</span>
    </div>

    <!-- 打卡日历 -->
    <div class="glass" style="border-radius:15px;padding:13px;margin-bottom:12px;">
      <div style="font-size:11px;font-weight:700;color:#B45309;margin-bottom:9px;">📅 本月打卡</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;">${cal}</div>
    </div>

    <!-- 曲目练习统计 -->
    ${pieces.length>0?`
    <div class="glass" style="border-radius:15px;padding:13px;margin-bottom:12px;">
      <div style="font-size:11px;font-weight:700;color:#B45309;margin-bottom:9px;">🎵 练习的曲目</div>
      ${pieces.map(([name,data])=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #FEF3C7;">
          <div>
            <div style="font-size:12px;font-weight:700;color:#854D0E;">${esc(name)}</div>
            <div style="font-size:10px;color:#B45309;">练了 ${data.count} 次 · ${data.minutes} 分钟</div>
          </div>
          <div style="font-weight:800;color:#EC4899;font-size:12px;">+${data.xp} XP</div>
        </div>`).join('')}
    </div>`:''}

    <!-- 练习记录列表 -->
    ${logs.length>0?`
    <div class="glass" style="border-radius:15px;padding:13px;margin-bottom:12px;">
      <div style="font-size:11px;font-weight:700;color:#B45309;margin-bottom:9px;">📋 最近20次记录</div>
      ${logs.slice(0,20).map(log=>{
        const phases=log.phases||[];
        const donePh=phases.filter(p=>p.done).length;
        return `<div class="practice-log-item">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;">
            <div>
              <div style="font-size:12px;font-weight:800;color:#854D0E;">${esc(log.pieceName)}</div>
              <div style="font-size:10px;color:#B45309;margin-top:2px;">${log.date} · ${log.totalMin}分钟</div>
              <div style="display:flex;gap:3px;margin-top:4px;">
                ${PHASES.map((ph,i)=>{const pd=phases[i];return`<span style="font-size:9px;padding:1px 6px;border-radius:5px;background:${pd?.done?ph.color:'rgba(0,0,0,.06)'};color:${pd?.done?'#fff':'#B45309'};">${ph.icon}</span>`}).join('')}
                ${log.aiTasksDone?`<span style="font-size:9px;padding:1px 6px;border-radius:5px;background:rgba(139,92,246,.15);color:#7C3AED;">AI×${log.aiTasksDone}</span>`:''}
              </div>
            </div>
            <div style="font-weight:800;color:#EC4899;font-size:13px;flex-shrink:0;">+${log.xpEarned}XP</div>
          </div>
        </div>`;
      }).join('')}
    </div>`:''}

    <!-- 成就 -->
    <div class="glass" style="border-radius:15px;padding:13px;margin-bottom:13px;">
      <div style="font-size:11px;font-weight:700;color:#B45309;margin-bottom:9px;">🎯 成就</div>
      ${ms.map(([l,d])=>`<div style="display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid #FEF3C7;"><span style="font-size:13px;">${d?'✅':'⬜'}</span><span style="font-size:11px;font-weight:600;color:${d?'#854D0E':'#D97706'};">${l}</span></div>`).join('')}
    </div>

    <div style="text-align:center;">
      <button class="btn" id="reset-btn" style="padding:8px 18px;background:#FEE2E2;border:1px solid #FCA5A5;color:#EF4444;font-size:11px;border-radius:9px;">重置当前档案数据</button>
    </div>
  </div>`;
}

function buildTabBar(){
  if(currentView==='setup'||currentView==='profiles')return'';
  const tabs=[{id:'home',icon:'🏠',label:'主页'},{id:'practice',icon:'🎹',label:'练琴'},{id:'game',icon:'🎮',label:'音游'},{id:'dex',icon:'📖',label:'图鉴'},{id:'pk',icon:'⚔️',label:'竞技'}];
  return `<div class="tab-inner">${tabs.map(t=>`<div class="tab-item ${currentView===t.id?'active':''}" data-nav="${t.id}" style="cursor:pointer;"><span class="tab-icon">${t.icon}</span><span class="tab-label">${t.label}</span></div>`).join('')}</div>`;
}

// ══════════════════════════════════════════
// 渲染 & 事件绑定
// ══════════════════════════════════════════
function render(){
  const vc=document.getElementById('view-content'),tb=document.getElementById('tab-bar');
  if(currentView==='setup'){vc.innerHTML=buildSetup();tb.innerHTML='';bindSetupEvents();return}
  if(currentView==='profiles'){vc.innerHTML=buildProfiles();tb.innerHTML='';bindProfilesEvents();return}
  const map={
    home:buildHome,
    practice:buildPractice,
    dex:buildDex,
    pk:buildPKArena,
    stats:buildStats,
    game:()=>gameState==='playing'?buildGamePlaying():gameState==='result'?buildGameResult():buildGameIdle()
  };
  vc.innerHTML=(map[currentView]||buildHome)();
  tb.innerHTML=buildTabBar();
  afterRender();
}

function bindSetupEvents(){
  const inp=document.getElementById('sn');
  if(inp)inp.addEventListener('keydown',e=>{if(e.key==='Enter')doSetup();});
}
function bindProfilesEvents(){
  const vc=document.getElementById('view-content');if(!vc)return;
  vc.addEventListener('click',e=>{
    const sw=e.target.closest('[data-action="switch"]');if(sw){switchProfile(sw.dataset.pid);return;}
    const del=e.target.closest('[data-action="delete"]');if(del){deleteProfile(del.dataset.pid);return;}
    if(e.target.id==='add-profile-btn')navigate('setup');
  });
}

function afterRender(){
  const tb=document.getElementById('tab-bar');
  if(tb)tb.addEventListener('click',e=>{const el=e.target.closest('[data-nav]');if(el)navigate(el.dataset.nav);});

  if(currentView==='home'){
    const vc=document.getElementById('view-content');if(!vc)return;
    const on=(id,fn)=>{const el=vc.querySelector('#'+id);if(el)el.addEventListener('click',fn);};
    on('switch-profile-btn',()=>navigate('profiles'));
    on('go-practice-btn',()=>navigate('practice'));
    on('go-game-btn',()=>navigate('game'));
    on('go-dex-btn',()=>navigate('dex'));
    on('go-stats-btn',()=>navigate('stats'));
    on('go-hatch-btn',()=>navigate('practice'));
  }
  if(currentView==='practice')afterPracticeRender();
  if(currentView==='game'){
    if(gameState==='playing')bindGameKeys();
    const b=document.getElementById('back-to-idle');
    if(b)b.addEventListener('click',()=>{gameState='idle';render();});
    if(gameState==='idle'){
      document.querySelectorAll('[data-song]').forEach(el=>{
        el.addEventListener('click',()=>{gameSong=parseInt(el.dataset.song);render();});
      });
    }
  }
  if(currentView==='pk'){
    const s1=document.getElementById('sel-f1'),s2=document.getElementById('sel-f2');
    if(s1)s1.addEventListener('change',e=>{pkFighter1=AppStore.profiles.find(p=>p.id===e.target.value);render();});
    if(s2)s2.addEventListener('change',e=>{pkFighter2=AppStore.profiles.find(p=>p.id===e.target.value);render();});
    const pa=document.getElementById('pk-again');if(pa)pa.addEventListener('click',()=>{pkState='idle';render();});
  }
  if(currentView==='stats'){
    const rb=document.getElementById('reset-btn');
    if(rb)rb.addEventListener('click',()=>{
      if(!confirm('确定要清空当前档案的所有数据？'))return;
      if(!S)return;
      const fresh=createProfile(S.name);fresh.id=S.id;
      const idx=AppStore.profiles.findIndex(p=>p.id===S.id);
      if(idx>=0){AppStore.profiles[idx]=fresh;S=fresh;}
      practiceState.sessionStarted=false;save();navigate('home');
    });
  }
}

// ── 全局暴露 ──
Object.assign(window,{
  navigate,doSetup,switchProfile,deleteProfile,
  doStartSession,toggleMetroPractice,changeBpm,completePhase,finishSession,completeAiTask,doHatch,
  loadSheet,clearSheet,toggleCamera,switchPracticeCamera,
  openAnalyzer,closeAnalyzer,captureAndAnalyze,switchAnalyzerCamera,applyAiAndStart,
  selectSong,startGame,endGame,hitLane,startPK,eggInteract,
});
render();
</script>
</body>
